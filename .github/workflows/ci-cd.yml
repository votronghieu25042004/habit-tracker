name: Habit Tracker CI/CD

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Build và Test Backend
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
        
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: ./backend/package-lock.json
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Tests
      run: npm test --if-present

  # Job 2: Build, Lint và Test Frontend (Vite)
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
        
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./frontend/package-lock.json
        
    - name: Install Dependencies
      run: npm ci
      
    - name: Run Linter
      run: npm run lint
      
    - name: Build Vite App
      run: npm run build
      
    - name: Run Tests
      run: npm test --if-present

  # Job 3: Build Docker Images (Chạy khi 2 job trên thành công)
  docker-build:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Build Backend Image
      run: docker build -t habit-tracker-backend ./backend
    - name: Build Frontend Image
      run: docker build -t habit-tracker-frontend ./frontend